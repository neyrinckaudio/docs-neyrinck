site_name: Neyrinck User Guides
site_description: User Guides For Neyrinck Products
site_url: https://docs.neyrinck.com/

hooks:
  - hooks.py

exclude_docs: |
  v-control-pro/
  v-console/
  spill/
  pt-peek/
  soundcode-dolby-e/

theme:
  name: material
  features:
    - navigation.tabs
    - toc.integrate
plugins:
  - include-markdown
nav:
  - Home:
    - Welcome: ./index.md
  - V-Control Pro: 'https://docs.neyrinck.com/v-control-pro/'
  - V-Console: 'https://docs.neyrinck.com/v-console/'
  - Spill: 'https://docs.neyrinck.com/spill/'
  - PT Peek: 'https://docs.neyrinck.com/pt-peek/'
  - SoundCode For Dolby E: 'https://docs.neyrinck.com/soundcode-dolby-e/'

markdown_extensions:
  - attr_list
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower